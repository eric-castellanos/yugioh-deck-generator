services:
  postgres:
    image: postgres:16
    container_name: yugioh-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-yugioh}
      POSTGRES_USER: ${POSTGRES_USER:-yugioh}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-yugioh}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-yugioh} -d ${POSTGRES_DB:-yugioh}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  zenml:
    image: zenmldocker/zenml-server:0.85.0
    container_name: yugioh-zenml
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ZENML_SERVER_AUTO_ACTIVATE: "true"
      ZENML_DEFAULT_USER_NAME: ${ZENML_DEFAULT_USER_NAME:-admin}
      ZENML_DEFAULT_USER_PASSWORD: ${ZENML_DEFAULT_USER_PASSWORD:-admin123}
    volumes:
      - zenml_data:/app

  redis:
    image: redis:7
    container_name: yugioh-feature-store
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data

  qdrant:
    image: qdrant/qdrant:v1.11.0
    container_name: yugioh-vector-store
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.14.3
    container_name: yugioh-mlflow
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      MLFLOW_BACKEND_STORE_URI: postgresql+psycopg2://${POSTGRES_USER:-yugioh}:${POSTGRES_PASSWORD:-yugioh}@postgres:5432/${POSTGRES_DB:-yugioh}
      MLFLOW_ARTIFACT_ROOT: s3://mlflow-artifacts
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minio}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minio123}
      AWS_DEFAULT_REGION: us-east-1
    command:
      [
        "mlflow",
        "server",
        "--host",
        "0.0.0.0",
        "--port",
        "5000",
        "--backend-store-uri",
        "postgresql+psycopg2://${POSTGRES_USER:-yugioh}:${POSTGRES_PASSWORD:-yugioh}@postgres:5432/${POSTGRES_DB:-yugioh}",
        "--artifacts-destination",
        "s3://mlflow-artifacts"
      ]
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: yugioh-minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio123}
    command: ["server", "/data", "--console-address", ":9001"]
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    container_name: yugioh-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint:
      [
        "/bin/sh",
        "-c",
        "mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minio} ${MINIO_ROOT_PASSWORD:-minio123} && mc mb -p local/mlflow-artifacts || true && mc anonymous set private local/mlflow-artifacts"
      ]
    restart: "no"

volumes:
  postgres_data:
  zenml_data:
  redis_data:
  qdrant_data:
  minio_data:
